name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check JavaScript syntax
        run: |
          for f in $(find scripts -name '*.js'); do
            echo "Checking $f"
            node --check "$f"
          done

      - name: Validate manifest.json
        run: node -e "JSON.parse(require('fs').readFileSync('manifest.json', 'utf8'))"
