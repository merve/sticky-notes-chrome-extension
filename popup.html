<!DOCTYPE html>
<html lang="tr">

<head>
  <title>Website Stickies</title>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="./styles/main.css" />
  <link rel="stylesheet" href="./styles/popup.css" />
  <link href="https://fonts.googleapis.com/css?family=Manrope:400,500,600,700" rel="stylesheet" />
</head>

<body>
  <div class="popup-container">
    <p class="popup-content">
      Website Stickies ile web sitelerinde istediğiniz metni seçerek hızlıca
      notlar ekleyebilirsiniz. Sadece sağ tıklayın, 'Not Ekle' seçeneğine
      tıklayarak seçtiğiniz metin yanında bir yapışkan not oluşturun.
    </p>
    <div class="popup-button">
      <button id="popup-open-notes">Tüm notları görüntüle</button>
    </div>
  </div>
  <script src="scripts/popup.js"></script>
</body>

</html>
