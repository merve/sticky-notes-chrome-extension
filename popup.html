<!DOCTYPE html>
<html lang="en">

<head>
  <title>Website Stickies</title>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="./styles/main.css" />
  <link rel="stylesheet" href="./styles/popup.css" />
  <link href="https://fonts.googleapis.com/css?family=Manrope:400,500,600,700" rel="stylesheet" />
</head>

<body>
  <div class="popup-container">
    <header class="popup-header">
      <img src="assets/images/icon48.png" width="26" height="26" alt="Sticky Notes logo" class="popup-logo" />
      <h1 class="popup-title" data-i18n="dashboardTitle">Sticky Notes</h1>
    </header>
    <p class="popup-content" data-i18n="popupIntro">
      With Website Stickies, you can quickly add notes by selecting text on any website. Just
      right-click and choose 'Add Note' to create a sticky note next to your selection.
    </p>
    <div class="popup-button">
      <button id="popup-open-notes" data-i18n="popupOpenNotes">View all notes</button>
    </div>
  </div>
  <script src="scripts/i18n.js"></script>
  <script src="scripts/popup.js"></script>
</body>

</html>
